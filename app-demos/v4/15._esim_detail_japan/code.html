<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>eSIM Detail - Japan</title>

                    "surface-variant": "#ede0da",

                    "primary-container": "#d71921",

                    "on-secondary-fixed-variant": "#5b4300",
                    "surface-tint": "#c00015",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#fff8f6",
                    "secondary-fixed-dim": "#edc158",
                    "inverse-primary": "#ffb4ac",
                    "secondary-fixed": "#ffdf9b",

                    "tertiary-fixed-dim": "#c4c3eb",

            "spacing": {

                    "stack_gap": "16px",

                    "container_padding": "24px"

            "fontFamily": {
                    "body-md": [

                    "label-caps": [

                    "numeric-data": [

<style>
        body {
            background-color: #FBF6EC;
        }
        .watercolor-sun {
            background: radial-gradient(circle, #D71921 40%, rgba(215, 25, 33, 0.8) 55%, transparent 70%);
            mix-blend-mode: multiply;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#FBF6EC] z-40">
<div class="flex justify-between items-center px-container_padding py-unit w-full max-w-full mx-auto h-16">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
</button>
<h1 class="font-headline-sm text-headline-sm tracking-widest text-primary uppercase absolute left-1/2 -translate-x-1/2 flex items-center gap-2">
                Japan eSIM
                <span class="inline-flex items-center justify-center w-6 h-4 bg-white rounded-sm border border-outline-variant overflow-hidden shrink-0 shadow-sm relative">
<span class="absolute w-2 h-2 rounded-full bg-primary-container top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></span>
</span>
</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
</header>
<main class="max-w-md mx-auto px-[20px] pt-stack_gap flex flex-col gap-section_gap">
<!-- HERO CARD -->
<section class="flex flex-col items-center justify-center bg-white rounded-t-[24px] rounded-b-xl shadow-[0_2px_8px_rgba(26,20,17,0.06)] p-container_padding pt-8 relative overflow-hidden">
<!-- Subtle background texture indication -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-variant via-transparent to-transparent pointer-events-none"></div>
<div class="w-24 h-24 rounded-full bg-[#FBF6EC] flex items-center justify-center mb-6 relative shadow-inner">
<div class="w-16 h-16 rounded-full watercolor-sun"></div>
</div>
<p class="font-label-caps text-label-caps text-secondary-container tracking-[0.2em]">····3492</p>
</section>
<!-- DETAIL CARD -->
<section class="bg-white rounded-[14px] shadow-[0_2px_8px_rgba(26,20,17,0.06)] p-container_padding flex flex-col gap-6">
<!-- Usage Bar -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end font-label-caps text-label-caps text-on-surface-variant">
<span>USED 0.4</span>
<span>TOTAL 1 GB</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full w-[40%] transition-all duration-1000 ease-out"></div>
</div>
</div>
<div class="h-px bg-outline-variant/30 w-full"></div>
<!-- Signal & Status -->
<div class="flex items-center gap-4">
<div class="flex items-end gap-[2px] h-6 shrink-0">
<div class="w-1.5 h-2 bg-secondary-container rounded-sm"></div>
<div class="w-1.5 h-3 bg-secondary-container rounded-sm"></div>
<div class="w-1.5 h-4 bg-secondary-container rounded-sm"></div>
<div class="w-1.5 h-5 bg-secondary-container rounded-sm"></div>
<div class="w-1.5 h-6 bg-surface-container-highest rounded-sm"></div>
</div>
<div class="flex flex-col">
<p class="font-body-md text-body-md text-tertiary flex items-center gap-2">
                        Connected to NTT Docomo
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
</p>
</div>
</div>
<!-- Action Row -->
<div class="flex gap-4 pt-2">
<button class="flex-1 bg-primary-container text-white font-body-md text-body-md font-medium rounded-full py-3 px-4 hover:opacity-90 active:scale-95 transition-all shadow-sm">
                    Refuel +1 GB
                </button>
<button class="flex-1 bg-transparent border border-outline-variant text-on-surface font-body-md text-body-md font-medium rounded-full py-3 px-4 hover:bg-surface-container-low active:scale-95 transition-all">
                    Turn off
                </button>
</div>
</section>
<!-- SETTINGS LIST -->
<section class="bg-white rounded-[14px] shadow-[0_2px_8px_rgba(26,20,17,0.06)] flex flex-col overflow-hidden">
<!-- Row 1 -->
<div class="flex items-center justify-between p-container_padding border-b border-outline-variant/30 active:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">LABEL</span>
<span class="font-body-md text-body-md text-on-surface">Japan trip</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">edit</span>
</div>
<!-- Row 2 -->
<div class="flex items-center justify-between p-container_padding border-b border-outline-variant/30">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">APN</span>
<span class="font-body-md text-[13px] text-tertiary font-medium">peanut.iot · auto</span>
</div>
</div>
<!-- Row 3 -->
<div class="flex items-center justify-between p-container_padding">
<span class="font-body-md text-body-md text-on-surface">Low data notification</span>
<button class="w-12 h-6 rounded-full bg-primary-container relative transition-colors duration-200 focus:outline-none">
<span class="absolute right-1 top-1 w-4 h-4 rounded-full bg-white shadow-sm transition-transform duration-200"></span>
</button>
</div>
</section>
<!-- DANGER ZONE -->
<div class="flex justify-center pt-8 pb-12">
<button class="font-body-md text-body-md text-error font-medium hover:opacity-80 active:scale-95 transition-all underline decoration-error/30 underline-offset-4">
                Remove eSIM
            </button>
</div>
</main>
</body></html>
