<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
/* Subtle Grain Overlay */
.grain-overlay::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDwBGBo4pC7APiEbfxyhOmoHYSUSPtsXNdXiMev-SqWG-7d_GPsTwyv8TbyKmmfoe9n5nV4WLuH1ZCZj_aRFEjW6-NvSQTCnmrQSGPD-rri8_9cx-vCSf6CUmZjL2cTl3ucujyb6YNo0lZwkJl0l8hYWMGYehaxG-WqHIHVRJhlb_cb8lCUcpy16Zwi6owsrRv7gh4KpWQMM4GFFj2A_NpODYlWCTHkvcTk7Jwe6d5oiS_CVyl_Pnl3pKUiUgfeYRlxqtkxZvaL6tE);
    opacity: 0.05;
    z-index: 10
    }
/* Painterly Cloud Watermark */
.cloud-watermark {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translatex(-50%);
    width: 80%;
    height: auto;
    opacity: 0.15;
    z-index: 5;
    filter: drop-shadow(0 1px 1px rgba(201, 160, 59, 0.4))
    }
@keyframes pulse {
    0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
        } 50% {
        opacity: 1;
        transform: scale(1);
        }
    }
.dot-loader {
    display: flex;
    gap: 8px
    }
.dot {
    width: 6px;
    height: 6px;
    background-color: #C9A03B;
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out both
    }
.dot:nth-child(1) {
    animation-delay: -0.32s
    }
.dot:nth-child(2) {
    animation-delay: -0.16s
    }</style>

<body class="bg-primary-container min-h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-white/20 grain-overlay">

</div>
</div>
<!-- Background Illustration Layer -->
<div class="cloud-watermark pointer-events-none">

        </h1>
<!-- Gold Rule -->

            Travel data, made for crew.
        </p>
</main>
<!-- Bottom Pulse Loader -->
<footer class="fixed bottom-12 left-1/2 -translate-x-1/2 z-20">
<div class="dot-loader">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</footer>
<!-- Interactive Atmosphere Script -->
<script>
        // Subtle drift for the cloud watermark based on device orientation or mouse
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const cloud = document.querySelector('.cloud-watermark');
            if (cloud) {
                cloud.style.transform = `translate(calc(-50% + ${moveX}px), ${moveY}px)`;
            }
        });

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 1.2s cubic-bezier(0.22, 1, 0.36, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>

<script>
/* Bridge: forward clicks on [data-go] to parent shell via postMessage */
document.addEventListener('click', function(e) {
  var el = e.target && e.target.closest && e.target.closest('[data-go]');
  if (!el) return;
  e.preventDefault();
  e.stopPropagation();
  var dest = el.getAttribute('data-go');
  try { window.parent.postMessage({type: 'crewlink-go', dest: dest}, '*'); }
  catch(_) {}
}, true);
/* Pointer cursor for any data-go element */
(function(){
  var style = document.createElement('style');
  style.textContent = '[data-go]{cursor:pointer !important;}';
  document.head && document.head.appendChild(style);
})();
</script>
