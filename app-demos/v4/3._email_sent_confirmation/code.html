                </p>
<div class="inline-block">
<span class="font-label-caps text-[14px] text-espresso gold-underline px-1">

</div>

                        </p>
</div>

<script>
        // Simple countdown logic for the timer
        let seconds = 45;
        const timerText = document.getElementById('timer-text');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdown);
                timerText.textContent = 'You can resend now';
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                const displaySec = seconds < 10 ? `0${seconds}` : seconds;
                timerText.textContent = `You can resend in 0:${displaySec}`;
            }
        }, 1000);

        // Interaction for resend
        resendBtn.addEventListener('click', () => {
            if (seconds <= 0) {
                // Mock resend action
                resendBtn.textContent = 'Sending...';
                setTimeout(() => {
                    resendBtn.textContent = 'Resent!';
                    setTimeout(() => {
                        resendBtn.textContent = 'Resend email';
                        seconds = 60;
                        // Reset would go here in a real app
                    }, 2000);
                }, 1000);
            }
        });
    </script>
