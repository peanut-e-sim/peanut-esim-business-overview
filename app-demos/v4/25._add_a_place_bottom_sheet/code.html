<body class="bg-background text-on-background font-body-md m-0 p-0 h-screen overflow-hidden flex flex-col relative">
<!-- Dimmed Background Context (Tokyo Crew Picks) -->
<div class="absolute inset-0 z-0 bg-surface-container opacity-50 flex flex-col">
<header class="bg-surface-bright dark:bg-surface text-primary dark:text-inverse-primary font-headline-sm text-headline-sm flex justify-between items-center w-full px-section_gap h-16 opacity-30">
<span class="material-symbols-outlined">menu</span>
<h1 class="font-display-lg text-display-lg font-bold text-primary dark:text-primary-fixed-dim">CrewLink</h1>
<span class="material-symbols-outlined">notifications</span>
</header>
<main class="flex-1 p-container_padding opacity-30">
<h2 class="font-headline-md text-headline-md mb-stack_gap text-on-surface">Tokyo Crew Picks</h2>
<div class="h-64 bg-surface-variant rounded-xl mb-stack_gap"></div>
<div class="h-64 bg-surface-variant rounded-xl"></div>
</main>
</div>
<!-- Modals Backdrop Blur -->
<div class="absolute inset-0 z-10 bg-surface/80 backdrop-blur-sm transition-opacity duration-300"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 w-full h-[80vh] bg-surface-container-lowest z-20 rounded-t-[24px] shadow-[0_-2px_8px_rgba(26,20,17,0.06)] flex flex-col transition-transform duration-300 translate-y-0">
<!-- Pull Handle -->
<div class="w-full flex justify-center pt-unit pb-3">
<div class="w-12 h-1.5 bg-secondary-fixed-dim rounded-full opacity-60"></div>
</div>
<div class="px-section_gap flex-1 overflow-y-auto pb-24">
<!-- Header -->
<div class="flex justify-between items-center mb-stack_gap">
<h2 class="font-headline-md text-headline-md text-on-surface">Share your spot</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-surface-container-low">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Detected Card -->
<div class="bg-surface-container-low border-l-[3px] border-secondary-fixed-dim rounded-lg p-stack_gap flex items-center gap-4 mb-section_gap shadow-sm">
<img alt="Detected Map Pin" class="w-8 h-8 rounded-full object-cover shrink-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzzFGZk_5bI6kN2UIYBi_eMxfRnhIG7gO0EhcYz-phV8ohsnvd3tVyDktE8k7YmDS4KaedtJqSN0Wp9ezCzt0dxbviAbDWks5Mi0O1zPJf-_q5NcA6lUynDTLn7kGOwzVZXU8gDc1uRxpQ4U0vVkrt5r4haiYiax3nvOIw3TtQP20hJbh9SdXs0HCFXLNv-2jLHJrHljaRIyL5BoxSD936HCRiqTpFbIUOT_ru75qYOfI7kv2knMs9LbClKENZloZojejvutB_HDg"/>
<div class="flex-1">
<p class="font-label-caps text-label-caps text-secondary uppercase mb-1">Detected from Share Sheet</p>
<p class="font-body-md text-body-md text-on-surface font-medium">Tatemichiya Diner · Tokyo</p>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">edit</span>
</button>
</div>
<!-- Photos Row -->
<div class="mb-section_gap">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block uppercase">Photos</label>
<div class="flex gap-4 overflow-x-auto pb-2">
<!-- Image Preview -->
<div class="w-24 h-24 rounded-[14px] shrink-0 border border-outline-variant overflow-hidden relative">
<img alt="Okonomiyaki preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8kzVtbgIfA1jEp9FCc6PDtOpgkBthAG87B92HyBUNvdsTte_rx0L772bQWt0cC8H2nVsUXHoW4rt1Bl9zCXuk6ePRCJcLVOghwXjfW6Qtr7DlVEISe0QyuI_yLV53rTlD6HmqT7Ra0fsVnWT8FF37uApxcMjUtWlaY4THVmMXDyxDD8N_HqRZa02mMjTH8axn_GwlG31unVnMkxts0mweT84lciVskIncb6geVw7Iijqosr6JOAw56x78mBy8yAG4zOX-iuMkUPY"/>
<button class="absolute top-1 right-1 bg-surface/80 rounded-full w-6 h-6 flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">cancel</span>
</button>
</div>
<!-- Empty Upload Slots -->
<button class="w-24 h-24 rounded-[14px] shrink-0 border-2 border-dashed border-outline-variant bg-surface-bright flex items-center justify-center text-secondary-fixed-dim hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
<button class="w-24 h-24 rounded-[14px] shrink-0 border-2 border-dashed border-outline-variant bg-surface-bright flex items-center justify-center text-secondary-fixed-dim hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
</div>
</div>
<!-- Category Dropdown -->
<div class="mb-stack_gap">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block uppercase">Category</label>
<button class="w-full flex justify-between items-center px-4 py-3 border border-outline-variant rounded-full text-on-surface font-body-md text-body-md bg-surface-bright hover:bg-surface-container-lowest transition-colors">
<span>Restaurant</span>
<span class="material-symbols-outlined text-on-surface-variant">arrow_drop_down</span>
</button>
</div>
<!-- Notes Textarea -->
<div class="mb-section_gap">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block uppercase">Notes</label>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-secondary-fixed-dim resize-none shadow-sm" placeholder="What makes this special for crew?" rows="4"></textarea>
</div>
<!-- Tag Chips -->
<div class="mb-section_gap">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block uppercase">Tags</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-outline-variant font-body-md text-body-md text-on-surface bg-surface-bright hover:bg-surface-container-low transition-colors">Late-night</button>
<button class="px-4 py-2 rounded-full border border-secondary-fixed-dim bg-secondary-container text-on-secondary-container font-body-md text-body-md transition-colors">Quiet</button>
<button class="px-4 py-2 rounded-full border border-outline-variant font-body-md text-body-md text-on-surface bg-surface-bright hover:bg-surface-container-low transition-colors">Near hotel</button>
<button class="px-4 py-2 rounded-full border border-outline-variant font-body-md text-body-md text-on-surface bg-surface-bright hover:bg-surface-container-low transition-colors">Free WiFi</button>
<button class="px-4 py-2 rounded-full border border-outline-variant font-body-md text-body-md text-on-surface bg-surface-bright hover:bg-surface-container-low transition-colors">Vegan</button>
<button class="px-4 py-2 rounded-full border border-outline-variant font-body-md text-body-md text-on-surface bg-surface-bright hover:bg-surface-container-low transition-colors">Cash-only</button>
</div>
</div>
</div>
<!-- Sticky Bottom CTA -->
<div class="absolute bottom-0 left-0 w-full p-4 bg-surface-container-lowest/90 backdrop-blur-md shadow-[0_-4px_16px_rgba(26,20,17,0.04)] pb-safe">
<button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-4 rounded-full hover:bg-primary transition-colors shadow-sm">
                Post to Crew Recs
            </button>
</div>
</div>
