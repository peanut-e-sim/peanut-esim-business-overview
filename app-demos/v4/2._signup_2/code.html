<body class="min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Right Watermark -->
<div class="absolute top-0 right-0 p-4 opacity-40 watercolor-blob select-none pointer-events-none">
<div class="w-20 h-20 bg-gradient-to-br from-[#D71921] to-[#C9A03B] rounded-full flex items-center justify-center rotate-12 overflow-hidden blur-xl absolute -z-10"></div>
<img alt="Paper airplane watermark" class="w-20 h-20 object-contain mix-blend-multiply" data-alt="A delicate, artistic watercolor illustration of a folded paper airplane rendered in soft shades of deep red and metallic gold. The style is loose and painterly, with organic bleed edges and subtle textures typical of high-end stationery. The airplane floats against a warm cream background, embodying a sense of travel, luxury, and professional aviation heritage. The lighting is soft and diffused, creating a serene, editorial atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfBeedX8H7rorL0MOVPQ2J-HT2yz7qdgZUk25TX7BrmEzWxrsOCw5NvaQCJtMGdSwTe5A0HGwjecJ0HcoDrYPGFO26yXbXjvs0ZKkMjOSa4sB6PUjfS_p2XWhs4bwIxCTN7JnKPQ7NQBkwBPIoSZtSn5uW5uZ1xsP01Eq9-6sBxfvtk9gDn4KYlF0ktkjXozhESc9fJyJxu0-CsST6SPJl87blI6dRoo61b-rTk1MxzcvJWGALQjwuAh211ddbpjGL-sLcYL7CfQ8"/>
</div>
<!-- Header Section -->
<header class="pt-8 px-gutter flex flex-col items-start w-full max-w-lg mx-auto">
<button class="mb-6 p-2 -ml-2 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#6B6259]" style="font-size: 24px;">chevron_left</span>
</button>
<h1 class="font-display-lg text-display-lg text-on-surface mb-1">Create your account</h1>
<p class="font-body-md text-[#6B6259] text-[15px]">Join the crew.</p>
</header>
<!-- Main Content Card -->
<main class="mt-8 px-gutter w-full max-w-lg mx-auto flex-grow">
<div class="bg-white rounded-card p-container_padding tonal-shadow">
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Input 1: Full Name -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-[#C9A03B]">FULL NAME</label>
<input class="w-full h-14 px-4 bg-white border border-outline-variant rounded-card focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40 font-body-md" placeholder="Akito Tanaka" type="text"/>
</div>
<!-- Input 2: Personal Email -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-[#C9A03B]">PERSONAL EMAIL</label>
<input class="w-full h-14 px-4 bg-white border border-outline-variant rounded-card focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40 font-body-md" placeholder="you@gmail.com" type="email"/>
<p class="text-[12px] leading-tight text-[#6B6259] px-1 font-body-md">
                        Use any personal email — we'll verify your crew status separately.
                    </p>
</div>
<!-- Input 3: Password -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-[#C9A03B]">PASSWORD</label>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 bg-white border border-outline-variant rounded-card focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40 font-body-md" id="password-input" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-icon">visibility</span>
</button>
</div>
<p class="text-[12px] text-[#6B6259] px-1 font-body-md">8+ characters</p>
</div>
<!-- CTA Button -->
<div class="pt-2">
<button class="w-full h-[56px] bg-[#D71921] hover:bg-[#ae0012] text-white font-semibold text-[16px] rounded-full transition-all active:scale-[0.98] duration-200 tonal-shadow" data-go="email-sent">
                        Create account
                    </button>
</div>
</form>
</div>
<!-- Sign In Link -->
<div class="mt-8 text-center">
<p class="text-[14px] text-on-surface-variant font-body-md">
                Already have an account? 
                <a class="text-[#2A2A4A] font-semibold hover:underline decoration-2 underline-offset-4 ml-1" data-go="home" href="#">Sign in</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="mt-auto py-8 px-gutter w-full max-w-lg mx-auto">
<p class="text-[11px] leading-relaxed text-[#6B6259] text-center max-w-[280px] mx-auto font-body-md">
            By signing up you agree to our <a class="underline" href="#">Terms</a> and <a class="underline" href="#">Privacy Policy</a>.
        </p>
<!-- Safe Area Spacer -->
<div class="h-6"></div>
</footer>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Suppression of Shell Components as per "The Destination Rule"
        // Since this is a Transactional/Signup page, no navigation shells are rendered.
    </script>

<script>
/* Bridge: forward clicks on [data-go] to parent shell via postMessage */
document.addEventListener('click', function(e) {
  var el = e.target && e.target.closest && e.target.closest('[data-go]');
  if (!el) return;
  e.preventDefault();
  e.stopPropagation();
  var dest = el.getAttribute('data-go');
  try { window.parent.postMessage({type: 'crewlink-go', dest: dest}, '*'); }
  catch(_) {}
}, true);
/* Pointer cursor for any data-go element */
(function(){
  var style = document.createElement('style');
  style.textContent = '[data-go]{cursor:pointer !important;}';
  document.head && document.head.appendChild(style);
})();
</script>
