<!-- Bottom Nav Suppression Logic: Hiding standard Nav for transactional flow -->

<script>
        // Subtle interaction for the OTP boxes
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Atmospheric micro-interaction: Subtle parallax on the blob image
        document.addEventListener('mousemove', (e) => {
            const blob = document.querySelector('.blob-mask');
            if(blob) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                blob.style.transform = `translate(${xAxis}px, ${yAxis}px) scale(1.05)`;
            }
        });
    </script>

<script>
/* Bridge: forward clicks on [data-go] to parent shell via postMessage */
document.addEventListener('click', function(e) {
  var el = e.target && e.target.closest && e.target.closest('[data-go]');
  if (!el) return;
  e.preventDefault();
  e.stopPropagation();
  var dest = el.getAttribute('data-go');
  try { window.parent.postMessage({type: 'crewlink-go', dest: dest}, '*'); }
  catch(_) {}
}, true);
/* Pointer cursor for any data-go element */
(function(){
  var style = document.createElement('style');
  style.textContent = '[data-go]{cursor:pointer !important;}';
  document.head && document.head.appendChild(style);
})();
</script>
