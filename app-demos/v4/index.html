<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewLink — App Demo v4 (interactive prototype)</title>
<style>
  :root {
    --red: #D71921; --red-dark: #6E0D14; --gold: #C9A03B; --gold-light: #E5C77B;
    --bg-shell: #1A1A1A; --panel: #232323; --panel-2: #2B2B2B;
    --text-shell: #F0F0F0; --text-2: #8C8C8C; --line: #383838;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg-shell); color: var(--text-shell); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.5; display: grid; grid-template-rows: auto 1fr; }
  .shell-topbar { background: var(--red); color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 14px; border-bottom: 1px solid var(--gold); }
  .shell-brand { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .shell-brand span { color: var(--gold-light); font-weight: 400; margin-left: 6px; font-size: 12px; }
  .shell-nav-controls { display: flex; align-items: center; gap: 12px; }
  .shell-ctrl-btn { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.18); padding: 8px 14px; border-radius: 4px; font: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; }
  .shell-ctrl-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
  .shell-ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .shell-indicator { font-family: "SF Mono", Consolas, monospace; font-size: 11px; color: var(--gold-light); letter-spacing: 0.08em; padding: 0 8px; }
  .shell-topbar-right { display: flex; gap: 16px; font-size: 11px; }
  .shell-topbar-right a { color: rgba(255,255,255,0.85); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .shell-topbar-right a:hover { color: #fff; }
  .shell-layout { display: grid; grid-template-columns: 280px 1fr; height: 100%; overflow: hidden; }
  .shell-sidebar { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; padding: 16px 0; }
  .shell-sidebar h3 { font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 14px 20px 8px; margin: 0; }
  .shell-sidebar a { display: flex; align-items: center; gap: 10px; padding: 8px 20px; color: var(--text-2); text-decoration: none; font-size: 13px; border-left: 3px solid transparent; }
  .shell-sidebar a:hover { color: var(--text-shell); background: var(--panel-2); }
  .shell-sidebar a.active { color: #fff; background: var(--panel-2); border-left-color: var(--red); }
  .shell-sidebar a .num { font-family: "SF Mono", monospace; font-size: 10px; color: var(--gold); width: 22px; flex-shrink: 0; font-weight: 700; }
  .shell-stage { background: var(--bg-shell); position: relative; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 30px; }
  .phone-frame { position: relative; width: 390px; height: 844px; background: #000; border-radius: 54px; padding: 14px; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 8px #1a1a1a, 0 0 0 9px rgba(255,255,255,0.06); flex-shrink: 0; }
  .phone-frame::before { content: ""; position: absolute; top: 26px; left: 50%; transform: translateX(-50%); width: 120px; height: 36px; background: #000; border-radius: 24px; z-index: 50; pointer-events: none; }
  .screen-iframe { width: 100%; height: 100%; border: none; border-radius: 40px; background: #FBF6EC; display: block; }
  .shell-stage-caption { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none; }
  .shell-stage-caption .hint { color: var(--gold-light); }
  @media (max-width: 900px) {
    .shell-layout { grid-template-columns: 1fr; }
    .shell-sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="shell-topbar">
  <div class="shell-brand">CrewLink<span>· App Demo v4 · Interactive Prototype</span></div>
  <div class="shell-nav-controls">
    <button class="shell-ctrl-btn" id="prevBtn">‹ Prev</button>
    <div class="shell-indicator" id="indicator">SCREEN 01 / 29</div>
    <button class="shell-ctrl-btn" id="nextBtn">Next ›</button>
  </div>
  <div class="shell-topbar-right">
    <a href="gallery.html">Gallery</a>
    <a href="../">All versions</a>
  </div>
</div>

<div class="shell-layout">
  <aside class="shell-sidebar" id="sidebar"></aside>
  <main class="shell-stage">
    <div class="phone-frame">
      <iframe class="screen-iframe" id="screenFrame" src="" title="CrewLink screen"></iframe>
    </div>
    <div class="shell-stage-caption">Tap any red button inside the phone · or use <span class="hint">◀ ▶</span> keys</div>
  </main>
</div>

<script>
const SCREENS = [
  { num: 1, slug:'splash',           title:'Splash',                       folder:'1._splash_screen_2',                 flow:'Onboarding' },
  { num: 2, slug:'signup',           title:'Signup',                       folder:'2._signup_2',                        flow:'Onboarding' },
  { num: 3, slug:'email-sent',       title:'Email sent',                   folder:'3._email_sent_confirmation',         flow:'Onboarding' },
  { num: 4, slug:'verify-otp',       title:'Verify crew · OTP',            folder:'4._verify_crew_otp_2',               flow:'Onboarding' },
  { num: 5, slug:'home',             title:'Home dashboard',               folder:'5._home_dashboard_2',                flow:'Home & Plans' },
  { num: 6, slug:'plans',            title:'Plans hub',                    folder:'6._plans_hub',                       flow:'Home & Plans' },
  { num: 7, slug:'compare',          title:'Compare cabins',               folder:'7._compare_monthly_tiers',           flow:'Home & Plans' },
  { num: 8, slug:'upload-roster',    title:'Upload roster',                folder:'8._upload_roster',                   flow:'Bundle + Buy' },
  { num: 9, slug:'detected',         title:'Detected destinations',        folder:'9._detected_destinations',           flow:'Bundle + Buy' },
  { num:10, slug:'bundle-confirmed', title:'Bundle confirmed',             folder:'10._bundle_confirmed_1',             flow:'Bundle + Buy' },
  { num:11, slug:'plan-detail',      title:'Plan detail · Japan',          folder:'11._plan_detail_japan',              flow:'Bundle + Buy' },
  { num:12, slug:'checkout',         title:'Checkout',                     folder:'12._checkout',                       flow:'Bundle + Buy' },
  { num:13, slug:'purchase-success', title:'Purchase success',             folder:'13._purchase_success',               flow:'Bundle + Buy' },
  { num:14, slug:'esim-library',     title:'eSIM library',                 folder:'14._esim_library',                   flow:'eSIMs + Activation' },
  { num:15, slug:'esim-detail',      title:'eSIM detail · Japan',          folder:'15._esim_detail_japan',              flow:'eSIMs + Activation' },
  { num:16, slug:'topup-sheet',      title:'Top-up bottom sheet',          folder:'16._top_up_bottom_sheet',            flow:'eSIMs + Activation' },
  { num:17, slug:'activate-modal',   title:'Activation modal',             folder:'17._activation_confirmation_modal',  flow:'eSIMs + Activation' },
  { num:18, slug:'refund-esim',      title:'Refund eSIM',                  folder:'18._refund_japan_esim',              flow:'Refunds' },
  { num:19, slug:'oops-refund',      title:'Oops refund',                  folder:'19._oops_refund',                    flow:'Refunds' },
  { num:20, slug:'refund-unused',    title:'Refund unused bundle',         folder:'20._refund_unused_destinations',     flow:'Refunds' },
  { num:21, slug:'failed-recovery',  title:'Failed eSIM recovery',         folder:'21._failed_esim_recovery',           flow:'Refunds' },
  { num:22, slug:'hotels',           title:'Hotels list',                  folder:'22._hotels_list',                    flow:'Hotels' },
  { num:23, slug:'hotel-detail',     title:'Hotel detail',                 folder:'23._hotel_detail_tokyo_marriott',    flow:'Hotels' },
  { num:24, slug:'crew-picks',       title:'Tokyo crew picks',             folder:'24._tokyo_crew_picks',               flow:'Crew Recs' },
  { num:25, slug:'add-place',        title:'Add a place',                  folder:'25._add_a_place_bottom_sheet',       flow:'Crew Recs' },
  { num:26, slug:'place-detail',     title:'Place detail · Tatemichiya',   folder:'26._place_detail_tatemichiya_diner', flow:'Crew Recs' },
  { num:27, slug:'points',           title:'Crew Points & rewards',        folder:'27._crew_points_rewards',            flow:'Points + AI' },
  { num:28, slug:'ai-support',       title:'AI Support · starter',         folder:'28._crew_ai_support',                flow:'Points + AI' },
  { num:29, slug:'ai-active',        title:'AI Support · active chat',     folder:'29._crew_ai_support_active',         flow:'Points + AI' },
];

const indicator = document.getElementById('indicator');
const sidebar = document.getElementById('sidebar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const frame = document.getElementById('screenFrame');

// Build sidebar via DOM methods (no innerHTML)
const flows = [];
SCREENS.forEach(s => { if (!flows.includes(s.flow)) flows.push(s.flow); });
flows.forEach(flow => {
  const h = document.createElement('h3');
  h.textContent = flow;
  sidebar.appendChild(h);
  SCREENS.filter(s => s.flow === flow).forEach(s => {
    const a = document.createElement('a');
    a.href = '#/' + s.slug;
    a.dataset.num = s.num;
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(s.num).padStart(2, '0');
    const name = document.createElement('span');
    name.textContent = s.title;
    a.appendChild(num);
    a.appendChild(name);
    sidebar.appendChild(a);
  });
});

function findScreen(hash) {
  const slug = (hash || '').replace(/^#\/?/, '').toLowerCase();
  if (!slug) return SCREENS[0];
  return SCREENS.find(s => String(s.num) === slug || s.slug === slug) || SCREENS[0];
}

function setScreen(s) {
  frame.src = s.folder + '/code.html';
  indicator.textContent = 'SCREEN ' + String(s.num).padStart(2, '0') + ' / 29 · ' + s.title.toUpperCase();
  document.querySelectorAll('.shell-sidebar a').forEach(a => {
    a.classList.toggle('active', parseInt(a.dataset.num) === s.num);
  });
  prevBtn.disabled = s.num === 1;
  nextBtn.disabled = s.num === SCREENS.length;
  const link = document.querySelector('.shell-sidebar a[data-num="' + s.num + '"]');
  if (link) link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function go(delta) {
  const cur = findScreen(location.hash);
  const idx = SCREENS.findIndex(s => s.num === cur.num);
  const next = SCREENS[idx + delta];
  if (next) location.hash = '#/' + next.slug;
}

function goTo(slug) {
  const t = SCREENS.find(s => s.slug === slug);
  if (t) location.hash = '#/' + t.slug;
}

// Listen for clicks bubbled from iframe via postMessage bridge
window.addEventListener('message', (e) => {
  if (!e.data || e.data.type !== 'crewlink-go') return;
  if (typeof e.data.dest === 'string') goTo(e.data.dest);
});

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));
window.addEventListener('hashchange', () => setScreen(findScreen(location.hash)));
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'ArrowRight') go(1);
});

if (!location.hash) location.hash = '#/splash';
setScreen(findScreen(location.hash));
</script>
</body>
</html>
