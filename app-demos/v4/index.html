<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewLink — App Demo v4 (clickable prototype)</title>
<style>
  :root {
    --red: #D71921; --red-dark: #6E0D14; --red-deep: #B81621;
    --gold: #C9A03B; --gold-light: #E5C77B;
    --bg: #1A1A1A; --panel: #232323; --panel-2: #2B2B2B;
    --text: #F0F0F0; --text-2: #8C8C8C; --line: #383838;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; line-height: 1.5; display: grid; grid-template-rows: auto 1fr; }

  .topbar { background: var(--red); color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 14px; border-bottom: 1px solid var(--gold); }
  .brand { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .brand span { color: var(--gold-light); font-weight: 400; margin-left: 6px; font-size: 12px; letter-spacing: 0.04em; }
  .nav-controls { display: flex; align-items: center; gap: 12px; }
  .ctrl-btn { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.18); padding: 8px 14px; border-radius: 4px; font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .ctrl-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ctrl-btn .arrow { font-size: 14px; }
  .screen-indicator { font-family: "SF Mono", Consolas, monospace; font-size: 11px; color: var(--gold-light); letter-spacing: 0.08em; padding: 0 8px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 11px; }
  .topbar-right a { color: rgba(255,255,255,0.85); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .topbar-right a:hover { color: #fff; }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: 100%; overflow: hidden; }

  .sidebar { background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; padding: 16px 0; }
  .sidebar h3 { font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 14px 20px 8px; }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 8px 20px; color: var(--text-2); text-decoration: none; font-size: 13px; transition: all 0.12s; border-left: 3px solid transparent; }
  .sidebar a:hover { color: var(--text); background: var(--panel-2); }
  .sidebar a.active { color: #fff; background: var(--panel-2); border-left-color: var(--red); }
  .sidebar a .num { font-family: "SF Mono", monospace; font-size: 10px; color: var(--gold); width: 22px; flex-shrink: 0; font-weight: 700; }
  .sidebar a .name { flex: 1; }

  .stage { background: var(--bg); position: relative; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 30px; }
  .phone-frame { position: relative; width: 390px; height: 844px; background: #000; border-radius: 54px; padding: 14px; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 8px #1a1a1a, 0 0 0 9px rgba(255,255,255,0.06); flex-shrink: 0; }
  .phone-frame::before { content: ""; position: absolute; top: 26px; left: 50%; transform: translateX(-50%); width: 120px; height: 36px; background: #000; border-radius: 24px; z-index: 5; }
  .screen-iframe { width: 100%; height: 100%; border: none; border-radius: 40px; background: #FBF6EC; display: block; overflow: hidden; }

  .stage-caption { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
  .stage-caption .hint { color: var(--gold-light); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">CrewLink<span>· App Demo v4 · Cabin-Class Editorial</span></div>
  <div class="nav-controls">
    <button class="ctrl-btn" id="prevBtn"><span class="arrow">‹</span> Prev</button>
    <div class="screen-indicator" id="indicator">SCREEN 01 / 29</div>
    <button class="ctrl-btn" id="nextBtn">Next <span class="arrow">›</span></button>
  </div>
  <div class="topbar-right">
    <a href="gallery.html">Gallery view</a>
    <a href="../">All versions</a>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="stage">
    <div class="phone-frame">
      <iframe class="screen-iframe" id="screenFrame" src="" title="CrewLink screen preview"></iframe>
    </div>
    <div class="stage-caption">Use <span class="hint">◀ ▶</span> arrow keys or sidebar to navigate · Click inside the phone to interact</div>
  </main>
</div>

<script>
const SCREENS = [
  { num: 1, slug: 'splash',        title: 'Splash',                          folder: '1._splash_screen_2', flow: 'Onboarding' },
  { num: 2, slug: 'signup',        title: 'Signup',                          folder: '2._signup_2', flow: 'Onboarding' },
  { num: 3, slug: 'email-sent',    title: 'Email sent',                      folder: '3._email_sent_confirmation', flow: 'Onboarding' },
  { num: 4, slug: 'verify-otp',    title: 'Verify crew · OTP',               folder: '4._verify_crew_otp_2', flow: 'Onboarding' },
  { num: 5, slug: 'home',          title: 'Home dashboard',                  folder: '5._home_dashboard_2', flow: 'Home & Plans' },
  { num: 6, slug: 'plans',         title: 'Plans hub',                       folder: '6._plans_hub', flow: 'Home & Plans' },
  { num: 7, slug: 'compare',       title: 'Compare cabins',                  folder: '7._compare_monthly_tiers', flow: 'Home & Plans' },
  { num: 8, slug: 'upload-roster', title: 'Upload roster',                   folder: '8._upload_roster', flow: 'Bundle + Buy' },
  { num: 9, slug: 'detected',      title: 'Detected destinations',           folder: '9._detected_destinations', flow: 'Bundle + Buy' },
  { num:10, slug: 'bundle-confirmed', title: 'Bundle confirmed',             folder: '10._bundle_confirmed_1', flow: 'Bundle + Buy' },
  { num:11, slug: 'plan-detail',   title: 'Plan detail · Japan',             folder: '11._plan_detail_japan', flow: 'Bundle + Buy' },
  { num:12, slug: 'checkout',      title: 'Checkout',                        folder: '12._checkout', flow: 'Bundle + Buy' },
  { num:13, slug: 'purchase-success', title: 'Purchase success',             folder: '13._purchase_success', flow: 'Bundle + Buy' },
  { num:14, slug: 'esim-library',  title: 'eSIM library',                    folder: '14._esim_library', flow: 'eSIMs + Activation' },
  { num:15, slug: 'esim-detail',   title: 'eSIM detail · Japan',             folder: '15._esim_detail_japan', flow: 'eSIMs + Activation' },
  { num:16, slug: 'topup-sheet',   title: 'Top-up bottom sheet',             folder: '16._top_up_bottom_sheet', flow: 'eSIMs + Activation' },
  { num:17, slug: 'activate-modal', title: 'Activation modal',               folder: '17._activation_confirmation_modal', flow: 'eSIMs + Activation' },
  { num:18, slug: 'refund-esim',   title: 'Refund eSIM',                     folder: '18._refund_japan_esim', flow: 'Refunds' },
  { num:19, slug: 'oops-refund',   title: 'Oops refund',                     folder: '19._oops_refund', flow: 'Refunds' },
  { num:20, slug: 'refund-unused', title: 'Refund unused bundle',            folder: '20._refund_unused_destinations', flow: 'Refunds' },
  { num:21, slug: 'failed-recovery', title: 'Failed eSIM recovery',          folder: '21._failed_esim_recovery', flow: 'Refunds' },
  { num:22, slug: 'hotels',        title: 'Hotels list',                     folder: '22._hotels_list', flow: 'Hotels' },
  { num:23, slug: 'hotel-detail',  title: 'Hotel detail',                    folder: '23._hotel_detail_tokyo_marriott', flow: 'Hotels' },
  { num:24, slug: 'crew-picks',    title: 'Tokyo crew picks',                folder: '24._tokyo_crew_picks', flow: 'Crew Recs' },
  { num:25, slug: 'add-place',     title: 'Add a place',                     folder: '25._add_a_place_bottom_sheet', flow: 'Crew Recs' },
  { num:26, slug: 'place-detail',  title: 'Place detail · Tatemichiya',      folder: '26._place_detail_tatemichiya_diner', flow: 'Crew Recs' },
  { num:27, slug: 'points',        title: 'Crew Points & rewards',           folder: '27._crew_points_rewards', flow: 'Points + AI' },
  { num:28, slug: 'ai-support',    title: 'AI Support · starter',            folder: '28._crew_ai_support', flow: 'Points + AI' },
  { num:29, slug: 'ai-active',     title: 'AI Support · active chat',        folder: '29._crew_ai_support_active', flow: 'Points + AI' },
];

const sidebar = document.getElementById('sidebar');
const frame = document.getElementById('screenFrame');
const indicator = document.getElementById('indicator');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// Build sidebar via DOM methods (safe — no innerHTML, no user input)
const flowsSeen = new Set();
SCREENS.forEach(s => { flowsSeen.add(s.flow); });
const flows = Array.from(flowsSeen);
flows.forEach(flow => {
  const h = document.createElement('h3');
  h.textContent = flow;
  sidebar.appendChild(h);
  SCREENS.filter(s => s.flow === flow).forEach(s => {
    const a = document.createElement('a');
    a.href = '#/' + s.slug;
    a.dataset.num = s.num;
    const numSpan = document.createElement('span');
    numSpan.className = 'num';
    numSpan.textContent = String(s.num).padStart(2, '0');
    const nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = s.title;
    a.appendChild(numSpan);
    a.appendChild(nameSpan);
    sidebar.appendChild(a);
  });
});

function findScreen(hash) {
  const slug = (hash || '').replace(/^#\/?/, '').toLowerCase();
  if (!slug) return SCREENS[0];
  const numMatch = SCREENS.find(s => String(s.num) === slug);
  if (numMatch) return numMatch;
  return SCREENS.find(s => s.slug === slug) || SCREENS[0];
}

function setScreen(s) {
  frame.src = s.folder + '/code.html';
  indicator.textContent = 'SCREEN ' + String(s.num).padStart(2, '0') + ' / 29 · ' + s.title.toUpperCase();
  document.querySelectorAll('.sidebar a').forEach(a => {
    a.classList.toggle('active', parseInt(a.dataset.num) === s.num);
  });
  prevBtn.disabled = s.num === 1;
  nextBtn.disabled = s.num === SCREENS.length;
  const activeLink = document.querySelector('.sidebar a[data-num="' + s.num + '"]');
  if (activeLink) activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function go(delta) {
  const current = findScreen(location.hash);
  const idx = SCREENS.findIndex(s => s.num === current.num);
  const next = SCREENS[idx + delta];
  if (next) location.hash = '#/' + next.slug;
}

prevBtn.addEventListener('click', () => go(-1));
nextBtn.addEventListener('click', () => go(1));
window.addEventListener('hashchange', () => setScreen(findScreen(location.hash)));
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'ArrowRight') go(1);
});

if (!location.hash) location.hash = '#/splash';
setScreen(findScreen(location.hash));
</script>

</body>
</html>
