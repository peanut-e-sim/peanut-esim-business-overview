<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewLink - Crew Recs and Souvenirs Guide</title>
<style>
  :root{--cream:#FBF6EC;--red:#D71921;--espresso:#1A1411;--gold:#C9A03B;--light:#F5EFE3;--muted:#7A6E65;--border:#E8DFD0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--cream);color:var(--espresso);min-height:100vh;}
  .header{background:var(--espresso);color:var(--cream);padding:24px 32px;display:flex;align-items:center;gap:16px;}
  .logo{width:40px;height:40px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white;flex-shrink:0;}
  .header-text h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}
  .header-text p{font-size:13px;color:rgba(251,246,236,0.6);margin-top:2px;}
  .header-badge{margin-left:auto;background:var(--gold);color:var(--espresso);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase;}
  .tabs{display:flex;background:var(--espresso);padding:0 32px;}
  .tab{padding:12px 20px;font-size:13px;font-weight:600;color:rgba(251,246,236,0.5);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:0.2px;}
  .tab.active{color:var(--cream);border-bottom-color:var(--gold);}
  .tab:hover:not(.active){color:rgba(251,246,236,0.8);}
  .controls{padding:20px 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--light);}
  .search-box{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;background:white;font-size:14px;color:var(--espresso);outline:none;transition:border-color 0.2s;}
  .search-box:focus{border-color:var(--gold);}
  .city-filter{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;background:white;font-size:13px;color:var(--espresso);outline:none;cursor:pointer;min-width:160px;}
  .city-filter:focus{border-color:var(--gold);}
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;}
  .cat-btn{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;}
  .cat-btn.active,.cat-btn:hover{background:var(--espresso);color:var(--cream);border-color:var(--espresso);}
  .stats{margin-left:auto;font-size:12px;color:var(--muted);}
  .content{padding:24px 32px;}
  .panel{display:none;}
  .panel.active{display:block;}
  .city-section{margin-bottom:36px;}
  .city-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1.5px solid var(--border);}
  .city-flag{font-size:24px;}
  .city-name{font-size:19px;font-weight:700;letter-spacing:-0.3px;}
  .city-meta{font-size:12px;color:var(--muted);margin-top:1px;}
  .iata-badge{background:var(--red);color:white;font-size:11px;font-weight:800;padding:3px 8px;border-radius:5px;letter-spacing:1px;}
  .hotel-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .hotel-chip{background:rgba(201,160,59,0.12);border:1px solid rgba(201,160,59,0.25);font-size:11px;padding:3px 8px;border-radius:4px;}
  .venues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
  .venue-card{background:white;border-radius:12px;border:1.5px solid var(--border);padding:16px;transition:box-shadow 0.2s,transform 0.2s;}
  .venue-card:hover{box-shadow:0 4px 20px rgba(26,20,17,0.08);transform:translateY(-1px);}
  .venue-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .venue-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .ic-cafe{background:#FFF3E0;}.ic-bar{background:#F3E5F5;}.ic-museum{background:#E8F5E9;}.ic-restaurant{background:#FDE7E7;}.ic-fitness{background:#E3F2FD;}
  .venue-name{font-size:14px;font-weight:700;line-height:1.3;}
  .venue-cat{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;}
  .venue-nbhd{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .venue-addr{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .venue-why{font-size:13px;color:#3A2F2B;line-height:1.5;margin-bottom:10px;}
  .venue-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .price-tag{font-size:12px;font-weight:700;color:var(--gold);}
  .price-free{color:#2e7d32;}
  .crew-tag{background:rgba(215,25,33,0.08);color:var(--red);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.3px;}
  .venue-links{display:flex;gap:6px;margin-left:auto;}
  .venue-link{font-size:11px;color:var(--gold);font-weight:600;text-decoration:none;}
  .venue-link:hover{text-decoration:underline;}
  .souvenir-section{margin-bottom:36px;}
  .souvenir-columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  @media(max-width:900px){.souvenir-columns{grid-template-columns:1fr;}}
  .souvenir-col h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1.5px solid var(--border);}
  .souvenir-item{background:white;border-radius:10px;border:1.5px solid var(--border);padding:12px 14px;margin-bottom:10px;}
  .souvenir-name{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4;}
  .souvenir-where{font-size:11px;color:var(--gold);font-weight:600;margin-bottom:4px;}
  .souvenir-why{font-size:12px;color:#4A3F3B;line-height:1.45;}
  .souvenir-cost{font-size:11px;font-weight:700;color:var(--muted);margin-top:5px;}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  @media(max-width:700px){.header,.controls,.content{padding-left:16px;padding-right:16px;}.tabs{padding:0 16px;}.venues-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CL</div>
  <div class="header-text">
    <h1>CrewLink &mdash; Crew Recs &amp; Souvenirs</h1>
    <p>Internal research database &mdash; top 30 Emirates DXB destinations</p>
  </div>
  <div class="header-badge">Internal</div>
</div>

<div class="tabs" id="tabBar"></div>

<div class="controls">
  <input class="search-box" id="searchInput" type="text" placeholder="Search venues, neighborhoods, cities&hellip;" oninput="filterContent()">
  <select class="city-filter" id="cityFilter" onchange="filterContent()"></select>
  <div class="cat-filter" id="catFilter"></div>
  <div class="stats" id="statsText"></div>
</div>

<div class="content">
  <div class="panel active" id="panel-venues"></div>
  <div class="panel" id="panel-souvenirs"></div>
</div>

<script>
(function(){
'use strict';
var venuesData=null,souvenirsData=null,currentCat='all',currentPanel='venues';
var catDefs=[{k:'all',lbl:'All'},{k:'cafe',lbl:'Cafes',icon:'☕'},{k:'bar',lbl:'Bars',icon:'🍸'},{k:'museum',lbl:'Museums',icon:'🏛'},{k:'restaurant',lbl:'Restaurants',icon:'🍽'},{k:'fitness',lbl:'Fitness',icon:'💪'}];
var catIcons={cafe:'☕',bar:'🍸',museum:'🏛',restaurant:'🍽',fitness:'💪'};
var catCls={cafe:'ic-cafe',bar:'ic-bar',museum:'ic-museum',restaurant:'ic-restaurant',fitness:'ic-fitness'};
var flags={'United Kingdom':'🇬🇧','Thailand':'🇹🇭','Singapore':'🇸🇬','Japan':'🇯🇵','South Korea':'🇰🇷','Hong Kong SAR':'🇭🇰','France':'🇫🇷','Germany':'🇩🇪','Australia':'🇦🇺','South Africa':'🇿🇦','Maldives':'🇲🇻','Malaysia':'🇲🇾','India':'🇮🇳','Spain':'🇪🇸','Italy':'🇮🇹','Switzerland':'🇨🇭','Netherlands':'🇳🇱','Turkey':'🇹🇷','New Zealand':'🇳🇿','Brazil':'🇧🇷','USA':'🇺🇸','Philippines':'🇵🇭','Indonesia':'🇮🇩','Seychelles':'🇸🇨','Mauritius':'🇲🇺'};

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildTabs(){
  var tb=document.getElementById('tabBar');
  [['venues','Venues DB'],['souvenirs','Souvenirs Guide']].forEach(function(pair,i){
    var d=document.createElement('div');d.className='tab'+(i===0?' active':'');d.textContent=pair[1];
    d.addEventListener('click',function(){switchPanel(pair[0]);});tb.appendChild(d);
  });
}

function buildCatBtns(){
  var cf=document.getElementById('catFilter');cf.innerHTML='';
  catDefs.forEach(function(c){
    var b=document.createElement('button');b.className='cat-btn'+(c.k==='all'?' active':'');
    b.textContent=(c.icon?c.icon+' ':'')+c.lbl;
    b.addEventListener('click',function(){setCat(c.k,b);});cf.appendChild(b);
  });
}

function switchPanel(panel){
  currentPanel=panel;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',(i===0&&panel==='venues')||(i===1&&panel==='souvenirs'));});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+panel).classList.add('active');
  document.getElementById('catFilter').style.display=panel==='venues'?'flex':'none';
  filterContent();
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');filterContent();
}

function filterContent(){
  var search=document.getElementById('searchInput').value.toLowerCase();
  var city=document.getElementById('cityFilter').value;
  if(currentPanel==='venues')filterVenues(search,city);else filterSouvenirs(search,city);
}

function makeCityHeader(dest){
  var flag=flags[dest.country]||'🌍';
  var wrap=document.createElement('div');wrap.className='city-header';
  var fl=document.createElement('span');fl.className='city-flag';fl.textContent=flag;wrap.appendChild(fl);
  var info=document.createElement('div');
  var nm=document.createElement('div');nm.className='city-name';nm.textContent=dest.city;info.appendChild(nm);
  var mt=document.createElement('div');mt.className='city-meta';mt.textContent=dest.country;info.appendChild(mt);
  wrap.appendChild(info);
  var badge=document.createElement('span');badge.className='iata-badge';badge.textContent=dest.iata;wrap.appendChild(badge);
  return wrap;
}

function renderVenues(){
  if(!venuesData)return;
  var container=document.getElementById('panel-venues');container.innerHTML='';
  // city filter dropdown
  var sel=document.getElementById('cityFilter');sel.innerHTML='';
  var allOpt=document.createElement('option');allOpt.value='';allOpt.textContent='All Cities';sel.appendChild(allOpt);

  venuesData.destinations.forEach(function(dest){
    var opt=document.createElement('option');opt.value=dest.iata;opt.textContent=dest.city+' ('+dest.iata+')';sel.appendChild(opt);

    var section=document.createElement('div');section.className='city-section';
    section.dataset.iata=dest.iata;section.dataset.city=dest.city.toLowerCase();section.dataset.country=dest.country.toLowerCase();

    section.appendChild(makeCityHeader(dest));

    var hotels=dest.emirates_layover_hotels_known||[];
    if(hotels.length){
      var hc=document.createElement('div');hc.className='hotel-chips';
      hotels.forEach(function(h){var ch=document.createElement('span');ch.className='hotel-chip';ch.textContent='🏨 '+h;hc.appendChild(ch);});
      section.appendChild(hc);
    }

    var grid=document.createElement('div');grid.className='venues-grid';

    dest.venues.forEach(function(v){
      var card=document.createElement('div');card.className='venue-card';
      card.dataset.category=v.category;
      card.dataset.search=(v.name+' '+(v.neighborhood||'')+' '+v.why_crew_relevant).toLowerCase();

      var top=document.createElement('div');top.className='venue-top';
      var ico=document.createElement('div');ico.className='venue-icon '+(catCls[v.category]||'');ico.textContent=catIcons[v.category]||'📍';top.appendChild(ico);
      var ni=document.createElement('div');
      var vn=document.createElement('div');vn.className='venue-name';vn.textContent=v.name;ni.appendChild(vn);
      var vc=document.createElement('div');vc.className='venue-cat';vc.textContent=v.category;ni.appendChild(vc);
      top.appendChild(ni);card.appendChild(top);

      if(v.neighborhood){var nb=document.createElement('div');nb.className='venue-nbhd';nb.textContent='📍 '+v.neighborhood;card.appendChild(nb);}
      if(v.address){var ad=document.createElement('div');ad.className='venue-addr';ad.textContent=v.address;card.appendChild(ad);}

      var wy=document.createElement('div');wy.className='venue-why';wy.textContent=v.why_crew_relevant;card.appendChild(wy);

      var ft=document.createElement('div');ft.className='venue-footer';
      var pr=document.createElement('span');pr.className='price-tag'+(v.price_range==='free'?' price-free':'');pr.textContent=v.price_range==='free'?'FREE':v.price_range;ft.appendChild(pr);
      if(v.crew_mentioned){var ct=document.createElement('span');ct.className='crew-tag';ct.textContent='CREW MENTIONED';ft.appendChild(ct);}

      var links=document.createElement('div');links.className='venue-links';
      if(v.contact&&v.contact.website){var a=document.createElement('a');a.className='venue-link';a.href='https://'+v.contact.website;a.target='_blank';a.rel='noopener';a.textContent='🌐 Web';links.appendChild(a);}
      if(v.contact&&v.contact.instagram){var ai=document.createElement('a');ai.className='venue-link';ai.href='https://instagram.com/'+v.contact.instagram.replace('@','');ai.target='_blank';ai.rel='noopener';ai.textContent=v.contact.instagram;links.appendChild(ai);}
      if(links.children.length)ft.appendChild(links);
      card.appendChild(ft);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    container.appendChild(section);
  });
  updateStats();
}

function filterVenues(search,city){
  if(!venuesData)return;
  var total=0;
  document.querySelectorAll('.city-section').forEach(function(section){
    var iata=section.dataset.iata;
    var cityMatch=!city||city===iata;
    var cards=section.querySelectorAll('.venue-card');
    var vis=0;
    cards.forEach(function(card){
      var catMatch=currentCat==='all'||card.dataset.category===currentCat;
      var sm=!search||card.dataset.search.includes(search)||section.dataset.city.includes(search)||section.dataset.country.includes(search);
      var show=cityMatch&&catMatch&&sm;
      card.style.display=show?'':'none';
      if(show){vis++;total++;}
    });
    section.style.display=vis>0?'':'none';
  });
  document.getElementById('statsText').textContent=total+' venues shown';
}

function renderSouvenirs(){
  if(!souvenirsData)return;
  var container=document.getElementById('panel-souvenirs');container.innerHTML='';

  souvenirsData.destinations.forEach(function(dest){
    var section=document.createElement('div');section.className='souvenir-section';
    section.dataset.iata=dest.iata;section.dataset.city=dest.city.toLowerCase();
    section.appendChild(makeCityHeader(dest));

    var cols=document.createElement('div');cols.className='souvenir-columns';
    var foodCol=makeColEl('🍜 Must-Try Food');
    var buyCol=makeColEl('🛍 Must-Buy Souvenirs');
    var expCol=makeColEl('✨ Must-Do Experiences');

    (dest.must_try_food||[]).forEach(function(it){foodCol.appendChild(makeSouvenirCard(it));});
    (dest.must_buy_souvenirs||[]).forEach(function(it){buyCol.appendChild(makeSouvenirCard(it));});
    (dest.must_do_experience||[]).forEach(function(it){expCol.appendChild(makeSouvenirCard(it));});

    cols.appendChild(foodCol);cols.appendChild(buyCol);cols.appendChild(expCol);
    section.appendChild(cols);container.appendChild(section);
  });
}

function makeColEl(title){
  var div=document.createElement('div');div.className='souvenir-col';
  var h3=document.createElement('h3');h3.textContent=title;div.appendChild(h3);return div;
}

function makeSouvenirCard(item){
  var div=document.createElement('div');div.className='souvenir-item';
  div.dataset.search=((item.item||'')+' '+(item.where||'')+' '+item.why).toLowerCase();
  var nm=document.createElement('div');nm.className='souvenir-name';nm.textContent=item.item;div.appendChild(nm);
  if(item.where){var wh=document.createElement('div');wh.className='souvenir-where';wh.textContent='📍 '+item.where;div.appendChild(wh);}
  var wy=document.createElement('div');wy.className='souvenir-why';wy.textContent=item.why;div.appendChild(wy);
  if(item.approx_cost){var co=document.createElement('div');co.className='souvenir-cost';co.textContent='~'+item.approx_cost;div.appendChild(co);}
  return div;
}

function filterSouvenirs(search,city){
  if(!souvenirsData)return;
  var total=0;
  document.querySelectorAll('.souvenir-section').forEach(function(section){
    var iata=section.dataset.iata;
    var cityMatch=!city||city===iata;
    var items=section.querySelectorAll('.souvenir-item');
    var vis=0;
    items.forEach(function(item){
      var sm=!search||item.dataset.search.includes(search)||section.dataset.city.includes(search);
      var show=cityMatch&&sm;item.style.display=show?'':'none';if(show){vis++;total++;}
    });
    section.style.display=vis>0?'':'none';
  });
  document.getElementById('statsText').textContent=total+' items shown';
}

function updateStats(){
  if(currentPanel==='venues'&&venuesData){
    var t=venuesData.destinations.reduce(function(a,d){return a+d.venues.length;},0);
    document.getElementById('statsText').textContent=t+' venues across '+venuesData.destinations.length+' cities';
  } else if(souvenirsData){
    var t=souvenirsData.destinations.reduce(function(a,d){return a+(d.must_try_food||[]).length+(d.must_buy_souvenirs||[]).length+(d.must_do_experience||[]).length;},0);
    document.getElementById('statsText').textContent=t+' items across '+souvenirsData.destinations.length+' cities';
  }
}

async function init(){
  buildTabs();buildCatBtns();
  document.getElementById('catFilter').style.display='flex';
  try{
    var [vr,sr]=await Promise.all([fetch('crew-recs-starter-db.json'),fetch('crew-souvenirs-guide.json')]);
    venuesData=await vr.json();souvenirsData=await sr.json();
  } catch(e){
    document.getElementById('panel-venues').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>JSON files not found. Serve with: <code>cd docs/downloads && npx serve .</code></p></div>';return;
  }
  renderVenues();renderSouvenirs();
}

init();
})();
</script>
</body>
</html>
