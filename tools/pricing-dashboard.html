const countEl = document.getElementById('count');
const state = { supplier: '', country: '', col: 'p', dir: 1 };

[...new Set(D.map(d => d.c))].sort().forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  countrySel.appendChild(o);
});

countrySel.onchange = () => { state.country = countrySel.value; render(); };

document.querySelectorAll('#supplier button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#supplier button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.supplier = b.dataset.v;
    render();
  };
});

document.querySelectorAll('th[data-c]').forEach(th => {
  th.onclick = () => {
    const col = th.dataset.c;
    if (state.col === col) state.dir = -state.dir;
    else { state.col = col; state.dir = 1; }
    document.querySelectorAll('th').forEach(t => t.classList.remove('up','dn'));
    th.classList.add(state.dir === 1 ? 'up' : 'dn');
    render();
  };
});

function render() {
  let rows = D.filter(d => {
    if (state.supplier && d.s !== state.supplier) return false;
    if (state.country && d.c !== state.country) return false;
    return true;
  });
  rows.sort((a,b) => {
    const c = state.col;
    let av = a[c], bv = b[c];
    if (c === 'd') { av = a.gv; bv = b.gv; }
    if (typeof av === 'string') return av.localeCompare(bv) * state.dir;
    return (av - bv) * state.dir;
  });
  countEl.textContent = rows.length.toLocaleString() + ' SKUs';
  const capped = rows.slice(0, 300);
  tb.innerHTML = capped.length === 0
    ? '<tr><td colspan="6" class="empty">No SKUs match</td></tr>'
    : capped.map(r => `<tr>
      <td>${r.c}</td>
      <td><span class="tag tag-${r.s === 'Sam' ? 'sam' : 'ea'}">${r.s === 'Sam' ? 'Samurai' : 'eSIM Access'}</span></td>
      <td>${r.d}</td>
      <td>${r.v}</td>
      <td class="price">$${r.p.toFixed(2)}</td>
      <td class="muted">${r.n}</td>
    </tr>`).join('');
  if (rows.length > 300) tb.innerHTML += `<tr><td colspan="6" class="empty">+${rows.length - 300} more — pick a country to narrow</td></tr>`;
}
render();
</script>
</body>
</html>
